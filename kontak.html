<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="kontak.css" rel="stylesheet"/>
    <title>Kontak - Katala</title>
</head>
<body>
    <nav>
        <div class="logo">KATALA</div>
        <div class="nav-link">
            <a href="index.html">Beranda</a>
            <a href="destinasi.html">Destinasi</a>
            <a href="galeri.html">Galeri</a>
            <a href="about.html">Tentang</a>
            <a href="kontak.html" class="nav-active">Kontak</a>
        </div>
        <button class="ct">Jelajahi</button>
    </nav>

    <div class="page">
        <div class="kontak-page">
            <div class="kontak-left">
                <h1 class="kontak-title">Hubungi<br>Kami</h1>
                <p class="kontak-desc">Ada pertanyaan tentang destinasi wisata Lampung? Kami siap membantu perjalananmu.</p>
                <div class="kontak-info-list">
                    <div class="kontak-info-item">
                        <p class="kontak-info-label">Email</p>
                        <p class="kontak-info-value">hello@katala.id</p>
                    </div>
                    <div class="kontak-info-item">
                        <p class="kontak-info-label">Instagram</p>
                        <p class="kontak-info-value">@katala.id</p>
                    </div>
                    <div class="kontak-info-item">
                        <p class="kontak-info-label">Lokasi</p>
                        <p class="kontak-info-value">Bandar Lampung, Indonesia</p>
                    </div>
                </div>
            </div>
            <div class="kontak-right">
                <h2 class="kontak-form-title">Kirim Pesan</h2>
                <div class="kontak-form-group">
                    <label class="kontak-label">Nama</label>
                    <input class="kontak-input" type="text" placeholder="Nama kamu">
                </div>
                <div class="kontak-form-group">
                    <label class="kontak-label">Email</label>
                    <input class="kontak-input" type="email" placeholder="email@kamu.com">
                </div>
                <div class="kontak-form-group">
                    <label class="kontak-label">Pesan</label>
                    <input class="kontak-input" type="text" placeholder="Tulis pesanmu...">
                </div>
                <button class="kontak-btn">Kirim Pesan</button>
            </div>
        </div>
    </div>
</body>
</html>
